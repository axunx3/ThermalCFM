# Synthetic dataset generation parameters
defaults:
  - default
  - forward_model

dataset:
  n_samples: 100000               # number of synthetic pairs
  val_fraction: 0.1
  test_fraction: 0.1

  # Thermal conductivity profile generation
  kappa_min: 0.1                   # W/(m·K), minimum κ
  kappa_max: 400.0                 # W/(m·K), maximum κ
  profile_types:                   # basis functions for κ(z)
    - piecewise_constant
    - exponential
    - gaussian_bump
    - random_combination
  n_basis_max: 5                   # max basis functions per profile

  # Noise model
  noise:
    real_fraction: 0.03            # 1-5% noise on real part
    imag_fraction: 0.07            # 5-10% noise on imaginary part
    one_over_f: true               # add 1/f noise at low frequencies
    one_over_f_amplitude: 0.02

  # Preprocessing
  log_kappa: true                  # work in log(κ) space
  normalize: true                  # z-score normalization

  save_dir: data/synthetic
