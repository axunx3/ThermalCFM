# Conditional Flow Matching training configuration
defaults:
  - default

model:
  # Velocity network architecture
  velocity_net:
    hidden_dims: [512, 512, 512, 512]
    activation: silu
    time_embed_dim: 128            # sinusoidal time encoding dimension
    condition_method: film          # film or concat
    dropout: 0.0

  # Flow matching
  flow:
    sigma_min: 1.0e-4              # minimum noise for interpolation
    ot_method: null                 # null, minibatch_ot

  # Reflow
  reflow:
    n_rounds: 2                    # number of reflow iterations
    n_steps_per_round: 100         # ODE integration steps for trajectory generation
    distill: false                 # one-step distillation after reflow

  # Physics constraint
  physics_loss:
    enabled: true
    weight: 0.1                    # λ for forward model consistency loss

training:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  epochs: 500
  batch_size: 512
  scheduler: cosine
  warmup_steps: 1000
  grad_clip: 1.0
  ema_decay: 0.999

inference:
  n_steps: 20                     # ODE integration steps
  solver: dopri5                   # torchdiffeq solver
  n_posterior_samples: 64          # samples for UQ
