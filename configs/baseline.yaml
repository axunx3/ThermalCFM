# Baseline methods configuration
defaults:
  - default

baselines:
  feldman:
    enabled: true

  tikhonov:
    enabled: true
    alpha: 1.0e-3                  # regularization strength
    alpha_search: [1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2, 1.0e-1]

  krr:
    enabled: true
    kernel: rbf
    alpha: 1.0e-3
    gamma: auto

  mlp:
    enabled: true
    hidden_dims: [256, 256, 256, 256]
    activation: relu
    dropout: 0.1
    lr: 1.0e-3
    epochs: 200
    batch_size: 256
