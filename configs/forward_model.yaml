# Borca-Tasciuc forward model parameters
defaults:
  - default

forward:
  # Heater line parameters
  heater_half_width: 5.0e-6     # b = 5 μm
  heater_length: 1.0e-3          # L = 1 mm
  power_per_length: 1.0          # P/L normalized

  # Frequency sweep
  freq_min: 10.0                  # Hz
  freq_max: 1.0e5                 # Hz
  n_freq: 60                      # number of frequency points (log-spaced)

  # Layer discretization
  n_layers: 100                   # depth discretization
  z_max: 50.0e-6                  # max depth = 50 μm

  # Quadrature
  n_quadrature: 64                # Gauss-Legendre integration points
  k_max: 1.0e7                    # spatial frequency cutoff
